on:
  push:
    branches:
      - '*'
      - '!main'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize


jobs:
  upload_tf_vars:
    name: 'Upload tfvars to Artifact'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extra Variables
        run: |
          jq -r --arg GITHUB_APP_KEY "$GITHUB_APP_KEY" '. += {
            "github_repository_name": "Just-Right-Cloud/argo-cd",
            "github_application_id": "${{ vars.ARGOCD_APP_ID }}",
            "github_application_installation_id": "${{ vars.ARGOCD_APP_INSTALLATION_ID }}",
            "github_application_private_key": "$GITHUB_APP_KEY",
            "cloudflare_api_token": "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          }' test.tfvars.json > injected.tfvars.json
        env:
          GITHUB_APP_KEY: |
            ${{ secrets.ARGOCD_APP_PRIVATE_KEY }}

      - run: cat injected.tfvars.json

      - name: Upload tfvars
        uses: actions/upload-artifact@v4
        with:
          name: tfvars
          path: 'injected.tfvars.json'

  test:
    if: github.repository != 'Tanchwa/infrastructure-deployment-template'
    name: 'Terraform Test'
    uses: Tanchwa/workflows-terraform-deployment/.github/workflows/terraform_test.yaml@main
    needs: upload_tf_vars
    secrets: 
      GOOGLE_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_STATE_BUCKET: ${{ secrets.GOOGLE_STATE_BUCKET }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      terraform_version: "1.12"
      working_directory: "."
      test_level: "integration"
      tf_vars_artifact: "tfvars"
      tf_vars_filename: "injected.tfvars.json"
      environment: "test"


