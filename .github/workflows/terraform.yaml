on:
  push:
    branches: 
      - '*'
      - '!main'
  pull_request:
    types:
      - opened
      - reopened
      - closed
      - synchronize


jobs:
  checkout: 
    name: 'Checkout Repository'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
  plan:
    if: github.repository != 'Tanchwa/infrastructure-deployment-template'
    name: 'Terraform Plan'
    uses: Tanchwa/workflows-terraform-deployment/.github/workflows/terraform_plan.yaml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
    with:
      terraform_version: "1.13"
      working_directory: "."

  apply:
    if: (github.event.pull_request.merged && github.base_ref == 'main') && github.repository != 'Tanchwa/infrastructure-deployment-template'
    needs: plan
    name: 'Terraform Apply'
    uses: Tanchwa/workflows-terraform-deployment/.github/workflows/terraform_apply.yaml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
    with:
      terraform_version: "1.13"
      working_directory: "."
      terraform_plan_file: ${{ needs.plan.outputs.plan_file }}
