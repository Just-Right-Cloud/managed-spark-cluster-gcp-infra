apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token
  namespace: cert-manager
stringData:
  api-token: "{{ .Values.cloudflareApiToken }}"
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token
  namespace: external-dns
stringData:
  api-token: "{{ .Values.cloudflareApiToken }}"
