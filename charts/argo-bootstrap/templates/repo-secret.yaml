---
apiVersion: v1
kind: Secret
metadata:
  name: default-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  url: "https://github.com/{{ .Values.githubRepositoryName }}.git"
  name: private-argo-repo
  project: default
  githubAppID: "{{ .Values.githubApplicationId }}"
  githubAppInstallationID: "{{ .Values.githubApplicationInstallationId }}"
  githubAppPrivateKey: {{ .Values.githubApplicationPrivateKey | toJson }}
