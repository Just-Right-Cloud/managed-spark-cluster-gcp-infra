---
apiVersion: v1
kind: Secret
metadata:
  name: default-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  url: "https://github.com/{{ .Values.githubRepositoryName }}"
  name: private-argo-repo
  project: default
  githubAppId: "{{ .Values.githubApplicationId }}"
  githubAppInstallationId: "{{ .Values.githubApplicationInstallationId }}"
  githubAppPrivateKey: "{{ .Values.githubApplicationPrivateKey }}"
